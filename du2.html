<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" rel="stylesheet">
</head>
<body>
    <ion-app>
        <ion-header>
            <ion-toolbar color="primary">
                <ion-title>Local Storage Úkol</ion-title>
                <ion-buttons slot="end">
                    <ion-badge id="item-count" color="light">0</ion-badge>
                </ion-buttons>
            </ion-toolbar>
        </ion-header>

        <ion-content class="ion-padding">
            <ion-item lines="full">
                <ion-label position="floating">Název záznamu</ion-label>
                <ion-input id="input-task" placeholder="Napiš úkol..."></ion-input>
            </ion-item>

            <div class="ion-margin-top">
                <ion-button expand="block" onclick="addTask()">Přidat úkol</ion-button>
                <ion-button expand="block" color="danger" fill="outline" onclick="clearAll()">Smazat vše</ion-button>
            </div>

            <h3 class="ion-padding-start">Seznam úkolů:</h3>
            
            <ion-list id="ionic-list" inset="true">
                </ion-list>
        </ion-content>
    </ion-app>

    <script>
        
        window.addEventListener('load', () => {
            showItems();
        });

        
        function showItems() {
            const list = document.getElementById('ionic-list');
            const badge = document.getElementById('item-count');
            list.innerHTML = ""; 
            
            
            for (let i = 0; i < localStorage.length; i++) {
                let key = localStorage.key(i);
                let value = localStorage.getItem(key);

                
                let slidingItem = document.createElement("ion-item-sliding");
                
                slidingItem.innerHTML = `
                    <ion-item>
                        <ion-label>
                            <h2>${value}</h2>
                            <p>Klíč: ${key}</p>
                        </ion-label>
                    </ion-item>
                    <ion-item-options side="end">
                        <ion-item-option color="danger" onclick="deleteItem('${key}')">
                            <ion-icon slot="icon-only" name="trash"></ion-icon>
                        </ion-item-option>
                    </ion-item-options>
                `;
                list.appendChild(slidingItem);
            }
            
            // Aktualizace badge
            badge.innerText = localStorage.length;
        }

        
        function addTask() {
            const input = document.getElementById('input-task');
            const text = input.value;

            if (text.trim() === "") {
                alert("Zadejte prosím text!");
                return;
            }

            // Jako klíč je použít Timestamp 
            const key = "task_" + Date.now();
            localStorage.setItem(key, text);
            
            input.value = ""; 
            showItems();      
        }

    
        function deleteItem(key) {
            localStorage.removeItem(key);
            showItems();
        }

        
        function clearAll() {
            if (confirm("Opravdu chcete smazat všechny záznamy?")) {
                localStorage.clear();
                showItems();
            }
        }
    </script>
</body>
</html>
