<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" rel="stylesheet">
</head>
<body>
    <ion-app>
        <ion-header>
            <ion-toolbar color="primary">
                <ion-title>Local Storage s prioritou</ion-title>
                <ion-buttons slot="end">
                    <ion-badge id="item-count" color="light">0</ion-badge>
                </ion-buttons>
            </ion-toolbar>
        </ion-header>

        <ion-content class="ion-padding">
            <ion-item>
                <ion-label position="floating">Název úkolu</ion-label>
                <ion-input id="input-task" placeholder="Co je potřeba udělat?"></ion-input>
            </ion-item>

            <ion-item>
                <ion-label>Priorita</ion-label>
                <ion-select id="select-priority" value="normal">
                    <ion-select-option value="high">Vysoká</ion-select-option>
                    <ion-select-option value="normal">Normální</ion-select-option>
                    <ion-select-option value="low">Nízká</ion-select-option>
                </ion-select>
            </ion-item>

            <div class="ion-margin-top">
                <ion-button expand="block" onclick="addTask()">Přidat úkol</ion-button>
                <ion-button expand="block" color="danger" fill="outline" onclick="clearAll()">Smazat vše</ion-button>
            </div>

            <ion-list id="ionic-list" inset="true"></ion-list>
        </ion-content>
    </ion-app>

    <script>
        window.addEventListener('load', () => showItems());

        function addTask() {
            const input = document.getElementById('input-task');
            const select = document.getElementById('select-priority');
            
            if (input.value.trim() === "") return;

            // Vytvoření objektu záznamu
            const taskObject = {
                name: input.value,
                priority: select.value,
                date: new Date().toLocaleString('cs-CZ')
            };

            // Uložení jako JSON string
            const key = "task_" + Date.now();
            localStorage.setItem(key, JSON.stringify(taskObject));
            
            input.value = ""; 
            showItems();
        }

        function showItems() {
            const list = document.getElementById('ionic-list');
            const badge = document.getElementById('item-count');
            list.innerHTML = "";
            
            for (let i = 0; i < localStorage.length; i++) {
                let key = localStorage.key(i);
                if (!key.startsWith("task_")) continue; // Ignorovat jiné záznamy

                // Načtení a parsování JSONu
                let taskData = JSON.parse(localStorage.getItem(key));

                // Určení barvy podle priority
                let color = "medium";
                if (taskData.priority === "high") color = "danger";
                if (taskData.priority === "low") color = "success";

                let slidingItem = document.createElement("ion-item-sliding");
                slidingItem.innerHTML = `
                    <ion-item>
                        <ion-label>
                            <h2>${taskData.name}</h2>
                            <p>${taskData.date}</p>
                        </ion-label>
                        <ion-chip color="${color}" slot="end">
                            <ion-label>${taskData.priority.toUpperCase()}</ion-label>
                        </ion-chip>
                    </ion-item>
                    <ion-item-options side="end">
                        <ion-item-option color="danger" onclick="deleteItem('${key}')">
                            <ion-icon slot="icon-only" name="trash"></ion-icon>
                        </ion-item-option>
                    </ion-item-options>
                `;
                list.appendChild(slidingItem);
            }
            badge.innerText = localStorage.length;
        }

        function deleteItem(key) {
            localStorage.removeItem(key);
            showItems();
        }

        function clearAll() {
            if (confirm("Smazat vše?")) {
                localStorage.clear();
                showItems();
            }
        }
    </script>
</body>
</html>
