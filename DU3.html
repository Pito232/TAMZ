<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <title>BMI Profi</title>
    
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" rel="stylesheet">

    <style>
        /* Toto roztáhne aplikaci na celou plochu */
        :root {
            --ion-safe-area-top: 20px;
        }
        ion-content {
            --padding-top: 20px;
        }
        .header-title {
            font-weight: 800 !important;
        }
        /* Zvětšení prvků pro palce na mobilu */
        ion-range, ion-select, ion-input {
            margin-top: 10px;
            margin-bottom: 10px;
            --padding-start: 16px;
        }
    </style>
</head>
<body>
    <ion-app>
        <ion-header translucent="true">
            <ion-toolbar color="primary">
                <ion-title class="header-title">BMI Profi Kalkulačka</ion-title>
            </ion-toolbar>
        </ion-header>

        <ion-content fullscreen="true" class="ion-padding">
            
            <ion-card>
                <ion-card-content>
                    <ion-item>
                        <ion-label position="stacked">Pohlaví</ion-label>
                        <ion-select id="gender" value="muz" interface="popover">
                            <ion-select-option value="muz">Muž</ion-select-option>
                            <ion-select-option value="zena">Žena</ion-select-option>
                        </ion-select>
                    </ion-item>

                    <ion-item>
                        <ion-label position="stacked">Věk</ion-label>
                        <ion-input id="age" type="number" value="25"></ion-input>
                    </ion-item>

                    <ion-item lines="none">
                        <ion-label>Váha: <b id="w-val">${data.weight}</b> kg</ion-label>
                    </ion-item>
                    <ion-range id="range-weight" min="30" max="150" value="80" 
                               onIonInput="document.getElementById('w-val').innerText = this.value">
                    </ion-range>

                    <ion-item lines="none">
                        <ion-label>Výška: <b id="h-val">${data.height}</b> cm</ion-label>
                    </ion-item>
                    <ion-range id="range-height" min="100" max="220" value="180" color="success"
                               onIonInput="document.getElementById('h-val').innerText = this.value">
                    </ion-range>

                    <ion-button expand="block" shape="round" class="ion-margin-top" onclick="calculateBMI()">
                        Vypočítat a uložit
                    </ion-button>
                </ion-card-content>
            </ion-card>

            <h3 style="margin-left: 16px;">Historie</h3>
            <ion-list id="bmi-history-list" inset="true">
                </ion-list>

            <ion-button expand="block" fill="clear" color="danger" onclick="clearHistory()">
                Smazat vše
            </ion-button>

        </ion-content>
    </ion-app>

    <script>
        window.addEventListener('load', () => showHistory());

        function calculateBMI() {
            // Získání hodnot z komponent
            const weight = parseFloat(document.getElementById('range-weight').value);
            const heightCm = parseFloat(document.getElementById('range-height').value);
            const age = document.getElementById('age').value;
            const gender = document.getElementById('gender').value;

            // Výpočet
            const heightM = heightCm / 100;
            const bmi = (weight / (heightM * heightM)).toFixed(1);

            // Kategorie
            let category = "Normální";
            let color = "success";
            if (bmi < 18.5) { color = "warning"; category = "Podváha"; }
            else if (bmi >= 25 && bmi < 30) { color = "warning"; category = "Nadváha"; }
            else if (bmi >= 30) { color = "danger"; category = "Obezita"; }

            // Příprava OBJEKTU (Value)
            const record = {
                bmi: bmi,
                category: category,
                color: color,
                weight: weight,
                height: heightCm,
                age: age,
                gender: gender === "muz" ? "Muž" : "Žena",
                date: new Date().toLocaleString('cs-CZ')
            };

            // Uložení (Key:Value)
            localStorage.setItem("pro_bmi_" + Date.now(), JSON.stringify(record));
            
            showHistory();
        }

        function showHistory() {
            const list = document.getElementById('bmi-history-list');
            list.innerHTML = "";

            // Seřazení klíčů od nejnovějšího (bonus)
            const keys = Object.keys(localStorage)
                               .filter(k => k.startsWith("pro_bmi_"))
                               .sort().reverse();

            keys.forEach(key => {
                const data = JSON.parse(localStorage.getItem(key));
                
                const slidingItem = document.createElement("ion-item-sliding");
                slidingItem.innerHTML = `
                    <ion-item>
                        <ion-label>
                            <h2><strong>${data.bmi}</strong> — ${data.category}</h2>
                            <p>${data.gender}, ${data.age} let | ${data.weight}kg, ${data.height}cm</p>
                            <small>${data.date}</small>
                        </ion-label>
                        <ion-badge color="${data.color}" slot="end">BMI</ion-badge>
                    </ion-item>
                    <ion-item-options side="end">
                        <ion-item-option color="danger" onclick="deleteEntry('${key}')">
                            <ion-icon slot="icon-only" name="trash"></ion-icon>
                        </ion-item-option>
                    </ion-item-options>
                `;
                list.appendChild(slidingItem);
            });
        }

        function deleteEntry(key) {
            localStorage.removeItem(key);
            showHistory();
        }

        function clearHistory() {
            if (confirm("Smazat všechna data o BMI?")) {
                Object.keys(localStorage)
                      .filter(k => k.startsWith("pro_bmi_"))
                      .forEach(k => localStorage.removeItem(k));
                showHistory();
            }
        }
    </script>
</body>
</html>
